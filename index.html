<!doctype html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <div class="logo">

      </div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="destination.html">Destinations</a>
        <a href="package.html">Packages</a>
